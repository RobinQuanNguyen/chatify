# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

# Config to run the tests for backend at this point.
name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    env:
      CI: true
      NODE_ENV: ${{ secrets.NODE_ENV }}
      MONGO_URI_FOR_TEST: ${{ secrets.MONGO_URI_FOR_TEST }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      RUN_PORT: ${{ secrets.RUN_PORT }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Start backend server
        run: npm run dev --prefix backend &

      - name: Wait for backend to be ready
        run: npx --prefix backend wait-on http://localhost:${RUN_PORT}/api/auth/test

      - name: Run backend tests
        run: npm test --prefix backend -- --runInBand

      - name: Run frontend tests
        run: npm test --prefix frontend
